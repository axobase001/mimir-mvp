version: "3.8"

services:
  mimir:
    build: .
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-mimir-production-secret-change-me}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    volumes:
      - mimir-data:/app/data
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mimir
    restart: unless-stopped

volumes:
  mimir-data:
